
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bwp traffic Simulation Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }
    .grid-bg {
      background-image: radial-gradient(circle, #334155 1px, transparent 1px);
      background-size: 30px 30px;
    }
    .terminal-font {
      font-family: 'JetBrains Mono', monospace;
    }
    @keyframes dash {
      to {
        stroke-dashoffset: -100;
      }
    }
    .animate-flow {
      stroke-dasharray: 10;
      animation: dash 5s linear infinite;
    }
    @keyframes packet-travel {
      0% { offset-distance: 0%; opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { offset-distance: 100%; opacity: 0; }
    }
    .packet-anim {
      animation: packet-travel 1.5s cubic-bezier(0.45, 0, 0.55, 1) forwards;
    }
  </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0"
  }
}
</script>
</head>
<body class="bg-[#0f172a] text-slate-200">
  <div id="root"></div>
</body>
</html>
